# Prod compose. Caddy TLS proxy + static frontend + gunicorn backend.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh scripts/start.sh
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 4 -b 0.0.0.0:8000
    restart: unless-stopped

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      - backend
      - redis
    command: celery -A app.workers.celery_app.celery worker --loglevel=info
    restart: unless-stopped

  beat:
    build: ./backend
    env_file: .env
    depends_on:
      - backend
      - redis
    command: celery -A app.workers.celery_app.celery beat --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api/v1}
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
      - "2087:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - ./certs:/etc/caddy/certs:ro
      - caddy-config:/config
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
