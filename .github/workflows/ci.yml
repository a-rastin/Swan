name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test
        run: pytest -q
        env:
          # override DB/redis for test environment — tests use in-memory SQLite
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          GEMINI_API_KEY: dummy
          GOOGLE_OAUTH_CLIENT_ID: dummy
          GOOGLE_OAUTH_CLIENT_SECRET: dummy
          GOOGLE_OAUTH_REDIRECT: http://localhost
          GOOGLE_DRIVE_REFRESH_TOKEN: dummy
          GOOGLE_DRIVE_ROOT_FOLDER_ID: dummy
          VAPID_PUBLIC: dummy
          VAPID_PRIVATE: dummy
          VAPID_SUBJECT: mailto:test@example.com
          EXTERNAL_API_MASTER_KEY: test-master-key
          N8N_WEBHOOK_URL: http://localhost/webhook
          DOMAIN: localhost

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
